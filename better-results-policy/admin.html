<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Back Dr — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #1a3a4a;
      --accent: #2e7d8a;
      --light: #f5f7f8;
      --border: #dce4e8;
      --muted: #5a6a72;
    }
    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: var(--light);
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: var(--brand);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #0f2533; }
    .login-error {
      font-size: 14px;
      color: #c0392b;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .login-error.show { display: block; }

    /* DASHBOARD */
    #dashboard { display: none; }
    #dashboard.show { display: block; }

    .topbar {
      background: var(--brand);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn-logout {
      padding: 8px 18px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .dashboard-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 32px;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      flex: 1;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .stat-card .label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      color: var(--brand);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--brand);
    }
    .btn-export {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-export:hover { background: #235f6a; }

    .search-wrap {
      margin-bottom: 16px;
    }
    #search-input {
      width: 100%;
      max-width: 360px;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--brand);
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--accent); }

    .table-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--light);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f0f8fa; }
    tbody td {
      padding: 16px 20px;
      font-size: 15px;
      color: var(--brand);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #e8f4f6;
      color: var(--accent);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }
    #loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* MODAL */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--brand);
    }
    .modal-date {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .btn-close {
      background: var(--light);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal img {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fafcfd;
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>The Back Dr</h1>
    <p>Admin — Better Results Policy</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn-login" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-title">The Back Dr &nbsp;·&nbsp; Signed Policies</div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
  <div class="dashboard-body">

    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Signed</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">This Month</div>
        <div class="value" id="stat-month">—</div>
      </div>
      <div class="stat-card">
        <div class="label">This Week</div>
        <div class="value" id="stat-week">—</div>
      </div>
    </div>

    <div class="section-header">
      <h2>All Signatures</h2>
      <button class="btn-export" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search by name…" oninput="filterTable()" />
    </div>

    <div class="table-wrap">
      <div id="loading-state">Loading…</div>
      <div id="empty-state">No signatures yet.</div>
      <table id="sig-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Signature</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Signature modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-date" id="modal-date"></div>
      </div>
      <button class="btn-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">✕</button>
    </div>
    <img id="modal-sig" src="" alt="Signature" />
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://eqkfbovepgogwvsixkld.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxa2Zib3ZlcGdvZ3d2c2l4a2xkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDYxOTIsImV4cCI6MjA5NjEyMjE5Mn0.IbcT8DFIquPogcWiDmJURlZnwzlJbIOpdDFyZB8h_Bc';
  const ADMIN_PASSWORD = 'backdr2024';

  let allRecords = [];

  function login() {
    const pw = document.getElementById('password-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      loadData();
    } else {
      document.getElementById('login-error').classList.add('show');
    }
  }

  function logout() {
    document.getElementById('dashboard').classList.remove('show');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
  }

  async function loadData() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      allRecords = await res.json();
      renderTable(allRecords);
      renderStats(allRecords);
    } catch (e) {
      document.getElementById('loading-state').textContent = 'Failed to load data.';
    }
  }

  function renderStats(records) {
    document.getElementById('stat-total').textContent = records.length;
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    document.getElementById('stat-month').textContent = records.filter(r => new Date(r.created_at) >= monthStart).length;
    document.getElementById('stat-week').textContent = records.filter(r => new Date(r.created_at) >= weekStart).length;
  }

  function renderTable(records) {
    document.getElementById('loading-state').style.display = 'none';
    if (records.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('sig-table').style.display = 'none';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('sig-table').style.display = 'table';
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    records.forEach((r, i) => {
      const dt = new Date(r.created_at);
      const date = dt.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
      const time = dt.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${allRecords.indexOf(r) + 1}</td>
        <td><strong>${escHtml(r.name)}</strong></td>
        <td>${date}</td>
        <td>${time}</td>
        <td><span class="badge">View</span></td>
      `;
      tr.addEventListener('click', () => openModal(r));
      tbody.appendChild(tr);
    });
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allRecords.filter(r => r.name.toLowerCase().includes(q));
    renderTable(filtered);
  }

  function openModal(r) {
    const dt = new Date(r.created_at);
    document.getElementById('modal-name').textContent = r.name;
    document.getElementById('modal-date').textContent = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) + ' at ' + dt.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modal-sig').src = r.signature_data;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('show');
    }
  }

  function exportCSV() {
    const rows = [['#', 'Name', 'Date', 'Time']];
    allRecords.forEach((r, i) => {
      const dt = new Date(r.created_at);
      rows.push([
        i + 1,
        r.name,
        dt.toLocaleDateString('en-AU'),
        dt.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' })
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'signed-policies.csv';
    a.click();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
